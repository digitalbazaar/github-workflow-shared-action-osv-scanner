# OSV-Scanner PR scanning reusable workflow, can be used as a PR action to detect new vulnerabilities being introduced.
name: Use OSV to do SCA on a PR

on:
  workflow_call:

jobs:
  ## run the following on PRs
  osv-scan-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          submodules: false
          # Do persist credentials, as we need it for the git checkout later
          persist-credentials: true
      - name: "Checkout base branch"
        run: |
          git checkout $GITHUB_BASE_REF
          git submodule update --recursive
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Does package-lock.json exist?
        id: base_package_lock
        uses: andstor/file-existence-action@076e0072799f4942c8bc574a82233e1e4d13e9d6 # v3.0.0
        with:
          files: "package-lock.json"
      - name: Generate `package-lock.json`
        if: steps.base_package_lock.outputs.files_exists == 'false'
        run: |
          npm install --package-lock-only --ignore-scripts
      - name: "Run scanner on existing code and generate Markdown"
        uses: google/osv-scanner-action/osv-scanner-action@2b64df4bbbe4e55a3a6cab3362485fbfaec5a2f8 # v2.0.3
        continue-on-error: true
        with:
          scan-args: |-
            --format=markdown
            --output=old-results.md
            --lockfile=package-lock.json
      - name: Store old results in variable
        continue-on-error: true
        id: old
        uses: juliangruber/read-file-action@b549046febe0fe86f8cb4f93c24e284433f9ab58 # v1.1.7
        with:
          path: old-results.md
      - name: "Checkout current branch"
        # Use -f in case any changes were made by osv-scanner (there should be no changes)
        run: |
          git checkout -f $GITHUB_SHA
          git submodule update --recursive
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Does package-lock.json exist?
        id: current_package_lock
        uses: andstor/file-existence-action@076e0072799f4942c8bc574a82233e1e4d13e9d6 # v3.0.0
        with:
          files: "package-lock.json"
      - name: Generate `package-lock.json`
        if: steps.current_package_lock.outputs.files_exists == 'false'
        run: |
          npm install --package-lock-only --ignore-scripts
      # post the generated markdown as a comment
      - name: "Run scanner on new code and generate Markdown"
        uses: google/osv-scanner-action/osv-scanner-action@2b64df4bbbe4e55a3a6cab3362485fbfaec5a2f8 # v2.0.3
        with:
          scan-args: |-
            --format=markdown
            --output=new-results.md
            --lockfile=package-lock.json
        continue-on-error: true
      - name: Store new results in variable
        id: new
        uses: juliangruber/read-file-action@b549046febe0fe86f8cb4f93c24e284433f9ab58 # v1.1.7
        with:
          path: new-results.md

      # Run npm audit and npm list to build up additional report explanations
      - name: npm audit
        id: npm_audit
        run: |
          echo 'result=$(npm audit --json)' >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: npm audit
        id: audit_report
        run: |
          AUDIT=$(echo "${{ toJson(steps.npm_audit.outputs.result) }}" | jq -r '
            "| Severity | Name | Version | Fix Available |",
            "| --- | --- | --- | --- |",
            (.vulnerabilities | to_entries | .[] |
              "| \(.value.severity) | \(.key) | \(.value.range) | \(.value.fixAvailable.version) |"
            )')
          # Use a random delimiter to capture the multi-line output
          delimiter=$(openssl rand -hex 8)
          echo "result<<$delimiter" >> $GITHUB_OUTPUT
          echo "$AUDIT" >> $GITHUB_OUTPUT
          echo "$delimiter" >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: npm list vulnerable dependencies
        id: list_report
        run: |
          DEPS=$(echo "${{ toJSON(steps.npm_audit.outputs.result) }}" | jq -r '[.vulnerabilities | to_entries[] | .key] | join(" ")')
          LIST=$(npm list $DEPS --json | jq -r '
            def walk_tree(prefix):
              to_entries | map(
                "\(prefix)\(.key)@\(.value.version)\n" +
                if .value.dependencies then
                  (.value.dependencies | walk_tree("  " + prefix))
                else
                  ""
                end
              ) | join("");
            .dependencies | walk_tree("* ")')
          # Use a random delimiter to capture the multi-line output
          delimiter=$(openssl rand -hex 8)
          echo "result<<$delimiter" >> $GITHUB_OUTPUT
          echo "$LIST" >> $GITHUB_OUTPUT
          echo "$delimiter" >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: combine npm audit/list reports
        id: combined_report
        run: |
          # Use a random delimiter to capture the multi-line output
          delimiter=$(openssl rand -hex 8)
          echo "result<<$delimiter" >> $GITHUB_OUTPUT
          echo "
            ### npm audit

            ${{ steps.audit_report.outputs.result }}

            ### npm list

            ${{ steps.list_report.outputs.result }}
          " >> $GITHUB_OUTPUT
          echo "$delimiter" >> $GITHUB_OUTPUT

      # Combine OSV, npm audit, and npm list output into a single comment
      - name: Add a comment containing OSV, npm audit, and npm list output
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          message: |
            ## Vulnerability results from base branch
            ${{ steps.old.outputs.content }}

            ${{ steps.combined_report.outputs.result }}
            ---

            ## Vulnerability results from current PR branch
            ${{ steps.new.outputs.content }}

            ${{ steps.combined_report.outputs.result }}
